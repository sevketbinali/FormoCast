services:
  scheduler:
    build: .
    volumes:
      - .:/app
      - data_volume:/app/data
      - plots_volume:/app/plots
    env_file:
      - .env
    command: ["python", "scheduler.py"]
    restart: always

  dashboard:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - data_volume:/app/data
    env_file:
      - .env
    command: ["python", "dashboard.py"]
    restart: always

  test:
    build: .
    volumes:
      - .:/app
    command: ["python", "-m", "unittest", "discover", "tests"]

volumes:
  data_volume:
  plots_volume:
